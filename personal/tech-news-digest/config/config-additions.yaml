# Additions to ~/.hermes/config.yaml for tech-news-digest.
# Merge these keys into the existing config (don't replace the whole file).

# 1. Allow skill env vars through the terminal/exec_code sandbox.
#    Non-blocklisted vars pass via base_env automatically; listing them here is
#    explicit belt-and-suspenders. (TND_TAVILY_KEY / TND_GITHUB_TOKEN are the
#    renamed, non-blocked versions — see docs/skill-env-rename.md.)
terminal:
  env_passthrough:
    - TWITTERAPI_IO_KEY
    - TND_TAVILY_KEY
    - TND_GITHUB_TOKEN
    - X_BEARER_TOKEN
    - BRAVE_API_KEY
    - BRAVE_API_KEYS
    - WEB_SEARCH_BACKEND
    - TWITTER_API_BACKEND
    - REDDIT_CLIENT_ID
    - REDDIT_CLIENT_SECRET
    - REDDIT_USERNAME

# 2. Auto-approve flagged commands inside cron jobs (they run unattended).
#    Interactive Telegram chat keeps approvals.mode (default manual) — still safe.
approvals:
  cron_mode: approve

# 3. Model (if not already set) — GLM Coding Plan endpoint.
model:
  default: zai/glm-5.2
  provider: zai
  base_url: https://api.z.ai/api/coding/paas/v4

# 4. Cron no_agent script timeout — raise Hermes' 120s default ceiling.
#    tech-digest.py self-limits to ~110s, but a flaky-network Telegram send tail
#    (pipeline timeout + GLM bursty latency + TG ReadError stalls) can push the
#    total past 120s and get the job killed. A 600s (10m) headroom absorbs that
#    variance without any script change. Merges into the existing cron: block.
#    Re-read fresh every run — no container restart needed.
cron:
  script_timeout_seconds: 600
