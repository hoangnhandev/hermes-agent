<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ads Copilot Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.js"></script>
</head>
<body>
    <div class="container" style="padding: 1rem; max-width: 1400px; margin: 0 auto;">
        <div class="header">
            <h1>Ads Copilot</h1>
            <span class="last-updated" id="lastUpdated">Last updated: --</span>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" data-tab="overview">Campaign Overview</button>
            <button class="tab-btn" data-tab="leads">Lead Metrics</button>
            <button class="tab-btn" data-tab="keywords">Ad Copy & Keywords</button>
            <button class="tab-btn" data-tab="budget">Budget Tracking</button>
        </div>

        <div id="overview-tab" class="tab-content active">
            <div id="overview-content"></div>
        </div>

        <div id="leads-tab" class="tab-content">
            <div id="leads-content"></div>
        </div>

        <div id="keywords-tab" class="tab-content">
            <div id="keywords-content"></div>
        </div>

        <div id="budget-tab" class="tab-content">
            <div id="budget-content"></div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="charts.js"></script>
    <script src="chart-tables.js"></script>
    <script src="utils.js"></script>
    <script src="render-functions.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
