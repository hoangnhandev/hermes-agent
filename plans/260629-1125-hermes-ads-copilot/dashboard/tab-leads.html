<div class="kpi-grid">
    <div class="kpi-card">
        <div class="kpi-top"><span class="kpi-label">Leads Today</span><span class="kpi-icon" data-icon="calendar"></span></div>
        <div class="kpi-value" id="leads-today">--</div>
        <div class="kpi-delta" id="leads-today-delta" hidden></div>
    </div>
    <div class="kpi-card">
        <div class="kpi-top"><span class="kpi-label">Leads This Week</span><span class="kpi-icon" data-icon="calendar"></span></div>
        <div class="kpi-value" id="leads-week">--</div>
        <div class="kpi-delta" id="leads-week-delta" hidden></div>
    </div>
    <div class="kpi-card">
        <div class="kpi-top"><span class="kpi-label">Leads All Time</span><span class="kpi-icon" data-icon="clock"></span></div>
        <div class="kpi-value" id="leads-alltime">--</div>
        <div class="kpi-delta" id="leads-alltime-delta" hidden></div>
    </div>
    <div class="kpi-card">
        <div class="kpi-top"><span class="kpi-label">Conv. Rate</span><span class="kpi-icon" data-icon="target"></span></div>
        <div class="kpi-value" id="leads-quality">--</div>
        <div class="kpi-delta" id="leads-quality-delta" hidden></div>
    </div>
</div>

<div class="section-card">
    <div class="section-card-header">
        <div><div class="section-card-title">Lead Trend</div></div>
    </div>
    <div style="position: relative; height: 320px;">
        <canvas id="leadTrendChart"></canvas>
    </div>
</div>

<div class="section-card">
    <div class="section-card-header">
        <div><div class="section-card-title">Lead Sources</div></div>
    </div>
    <div style="position: relative; height: 320px;">
        <canvas id="leadSourcesChart"></canvas>
    </div>
</div>
